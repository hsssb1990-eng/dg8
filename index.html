<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رصد الدرجات الشاملة</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --text-color: #2c3e50; --card-bg: #ffffff;
            --border-color: #ddd; --input-bg: #fff; --primary-color: #3498db;
            --success-color: #27ae60; --warning-color: #e67e22; --purple-color: #8e44ad;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--text-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 25px; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        select, button { padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 16px; font-family: inherit;}
        select { background-color: var(--input-bg); min-width: 150px; cursor: pointer; }
        
        button { font-weight: bold; cursor: pointer; transition: 0.3s; color: white; border: none; }
        .btn-fetch { background-color: var(--primary-color); }
        .btn-fetch:hover { background-color: #2980b9; }
        .btn-add { background-color: var(--success-color); display: inline-block; }
        .btn-add:hover { background-color: #2ecc71; }
        .btn-bulk { background-color: var(--purple-color); }
        .btn-bulk:hover { background-color: #9b59b6; }
        .btn-save { background-color: var(--warning-color); padding: 15px 40px; font-size: 18px; width: 100%; max-width: 400px;}
        .btn-save:hover { background-color: #d35400; }
        .btn-save:disabled { background-color: #95a5a6; cursor: not-allowed; }

        .bulk-add-container { background: #fdfefe; padding: 15px; border-radius: 8px; border: 2px dashed #bdc3c7; margin-bottom: 20px; }
        .bulk-add-container h4 { margin-top: 0; color: var(--purple-color); margin-bottom: 10px; }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; margin-bottom: 10px; font-family: inherit; font-size: 15px; resize: vertical; box-sizing: border-box; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .table-responsive { overflow-x: auto; margin-bottom: 30px; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { border: 1px solid var(--border-color); padding: 12px 8px; text-align: center; }
        th { background-color: #ecf0f1; color: #2c3e50; font-weight: bold; }
        
        input[type="text"] { width: 220px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 14px; }
        input[type="number"] { width: 55px; padding: 8px 4px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; font-family: inherit;}
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .row-number { font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>منصة رصد الدرجات الإلكترونية الموحدة</h2>
    
    <div class="controls">
        <select id="grade" onchange="clearTable()">
            <option value="8">الصف الثامن</option>
            <option value="10">الصف العاشر</option>
        </select>
        <select id="section" onchange="clearTable()">
            <option value="1">شعبة 1</option>
            <option value="2">شعبة 2</option>
            <option value="3">شعبة 3</option>
            <option value="4">شعبة 4</option>
            <option value="5">شعبة 5</option>
            <option value="6">شعبة 6</option>
        </select>
        <button class="btn-fetch" onclick="fetchExistingStudents(this)">🔄 جلب الأسماء والدرجات المسجلة</button>
    </div>

    <div class="bulk-add-container">
        <h4>📥 إضافة مجموعة أسماء دفعة واحدة (نسخ ولصق)</h4>
        <textarea id="bulkNamesTextarea" rows="4" placeholder="انسخ قائمة الأسماء من إكسل (اسم في كل سطر) والصقها هنا..."></textarea>
        <button class="btn-bulk" onclick="addBulkNames()">+ تحويل الأسماء إلى صفوف في الجدول</button>
    </div>

    <div class="action-bar">
        <button class="btn-add" onclick="addNewRow()">+ إضافة طالب واحد (صف فارغ)</button>
        <span style="font-size: 14px; color: #7f8c8d;">جميع الصفوف تعتمد الآن نفس استمارة التقييم (100 درجة).</span>
    </div>

    <div class="table-responsive">
        <table id="gradesTable">
            <thead>
                <tr>
                    <th>م</th>
                    <th>اسم الطالب</th>
                    <th>حوار (1)</th>
                    <th>حوار (2)</th>
                    <th>عملي (1)</th>
                    <th>عملي (2)</th>
                    <th>اختبار قصير</th>
                    <th>مشروع</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div style="text-align: center;">
        <button id="saveBtn" class="btn-save" onclick="submitData()">💾 حفظ البيانات وإرسالها لجوجل شيت</button>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ تنبيه: ضع الرابط الخاص بك هنا 
    // ==========================================
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyevoHK2R0yGIDD6j_s9kluRiQtDuIfS-w83TaPUHHbnzFcOe_ARQMdhfYJN6J9ifpB/exec';
    
    let rowCount = 0; 

    function clearTable() {
        document.getElementById('tableBody').innerHTML = '';
        rowCount = 0;
    }

    // إضافة صف يعتمد استمارة واحدة للجميع
    function addNewRow(data = []) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.className = 'student-row';
        rowCount++;

        // data map from Google Sheets:
        // [0]الاسم | [1]حوار1 | [2]حوار2 | [3]مجموع | [4]عملي1 | [5]عملي2 | [6]مجموع | [7]اختبار | [8]مشروع
        row.innerHTML = `
            <td class="row-number">${rowCount}</td>
            <td><input type="text" class="s-name" value="${data[0] || ''}" placeholder="اكتب اسم الطالب..."></td>
            <td><input type="number" class="s-d1" max="10" value="${data[1] !== undefined ? data[1] : ''}"></td>
            <td><input type="number" class="s-d2" max="10" value="${data[2] !== undefined ? data[2] : ''}"></td>
            <td><input type="number" class="s-a1" max="20" value="${data[4] !== undefined ? data[4] : ''}"></td>
            <td><input type="number" class="s-a2" max="20" value="${data[5] !== undefined ? data[5] : ''}"></td>
            <td><input type="number" class="s-test" max="20" value="${data[7] !== undefined ? data[7] : ''}"></td>
            <td><input type="number" class="s-proj" max="20" value="${data[8] !== undefined ? data[8] : ''}"></td>
        `;
        tbody.appendChild(row);
    }

    function addBulkNames() {
        const textarea = document.getElementById('bulkNamesTextarea');
        const lines = textarea.value.split('\n');
        let addedCount = 0;

        lines.forEach(line => {
            const name = line.trim();
            if (name !== '') {
                addNewRow([name]); 
                addedCount++;
            }
        });

        if (addedCount > 0) {
            alert(`تمت إضافة ${addedCount} طالب/ة للجدول بنجاح!`);
            textarea.value = ''; 
        } else {
            alert("لم يتم العثور على أسماء. تأكد من اللصق بشكل صحيح.");
        }
    }

    async function fetchExistingStudents(btn) {
        if(scriptURL === 'رابط_السكريبت_هنا'){
            alert("يرجى وضع رابط السكريبت أولاً!"); return;
        }

        const grade = document.getElementById('grade').value;
        const section = document.getElementById('section').value;
        const originalText = btn.innerHTML;
        
        btn.innerHTML = "⏳ جاري الاتصال بالخادم...";
        btn.disabled = true;
        
        try {
            const response = await fetch(`${scriptURL}?grade=${grade}&section=${section}`);
            const result = await response.json();
            
            clearTable();
            
            if (result.result === "success" && result.data.length > 0) {
                result.data.forEach(studentData => addNewRow(studentData));
            } else {
                alert("الورقة فارغة أو غير موجودة حتى الآن. يمكنك بدء إضافة الطلاب.");
            }
        } catch (e) { 
            alert("حدث خطأ في الاتصال."); 
        }
        
        btn.innerHTML = originalText;
        btn.disabled = false;
    }

    function submitData() {
        if(scriptURL === 'رابط_السكريبت_هنا'){
            alert("يرجى وضع رابط السكريبت أولاً!"); return;
        }

        const grade = document.getElementById('grade').value;
        const section = document.getElementById('section').value;
        const students = [];
        
        document.querySelectorAll('.student-row').forEach(row => {
            const nameInput = row.querySelector('.s-name').value.trim();
            if (nameInput !== "") { 
                students.push({
                    name: nameInput,
                    d1: row.querySelector('.s-d1').value,
                    d2: row.querySelector('.s-d2').value,
                    a1: row.querySelector('.s-a1').value,
                    a2: row.querySelector('.s-a2').value,
                    test: row.querySelector('.s-test').value,
                    proj: row.querySelector('.s-proj').value
                });
            }
        });

        if (students.length === 0) {
            alert("لا توجد بيانات لحفظها!"); return;
        }

        const saveBtn = document.getElementById('saveBtn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = "⏳ جاري الحفظ...";
        saveBtn.disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ grade: grade, section: section, students: students })
        })
        .then(res => res.json())
        .then(res => {
            if(res.result === "success") {
                alert("✅ تم إرسال وحفظ البيانات بنجاح في جوجل شيت!");
            } else {
                alert("❌ خطأ: " + res.message);
            }
            saveBtn.innerHTML = originalText;
            saveBtn.disabled = false;
        })
        .catch(e => { 
            alert("❌ حدث خطأ في الاتصال!"); 
            saveBtn.innerHTML = originalText;
            saveBtn.disabled = false; 
        });
    }
</script>

</body>
</html>
